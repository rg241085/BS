<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Payment Ledger</title>
    <style>
        /* Modern System Fonts */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f4f8;
            color: #333;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: white;
            max-width: 1000px;
            margin: auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        /* Header & Action Buttons */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .header-section h2 {
            margin: 0;
            color: #1e293b;
            font-size: 24px;
            display: flex;
            align-items: center;
        }

        /* Main Header Totals */
        .main-header-amount {
            color: #ef4444;
            font-size: 20px;
            margin-left: 12px;
            font-weight: 700;
        }

        .main-header-entries {
            color: #64748b;
            font-size: 16px;
            margin-left: 8px;
            font-weight: 600;
        }

        .header-actions button {
            padding: 8px 15px;
            border-radius: 6px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            margin-left: 10px;
            transition: 0.2s;
        }

        .btn-print {
            background: #475569;
            color: white;
        }

        .btn-print:hover {
            background: #334155;
        }

        .btn-clear {
            background: #fee2e2;
            color: #ef4444;
        }

        .btn-clear:hover {
            background: #fca5a5;
            color: white;
        }

        /* Input Form Area */
        .form-card {
            background: #f8fafc;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            margin-bottom: 30px;
        }

        .grid-input {
            display: grid;
            grid-template-columns: 2fr 1.5fr 3fr 120px;
            gap: 15px;
            align-items: end;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .input-group label {
            font-size: 12px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 5px;
        }

        input {
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
        }

        input:focus {
            border-color: #3b82f6;
        }

        .btn-add {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
            height: 44px;
        }

        .btn-add:hover {
            background: #2563eb;
        }

        /* Table Design */
        .table-grid {
            display: grid;
            grid-template-columns: 100px 2fr 1.5fr 3fr 100px;
            gap: 15px;
            align-items: center;
            text-align: left;
        }

        .table-header {
            background: #1e293b;
            color: white;
            font-weight: 600;
            padding: 15px;
            border-radius: 8px 8px 0 0;
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        .list-container {
            border: 1px solid #e2e8f0;
            border-top: none;
            border-radius: 0 0 8px 8px;
            background: white;
        }

        .list-item {
            padding: 15px;
            border-bottom: 1px solid #f1f5f9;
            transition: background 0.2s;
        }

        .list-item:hover {
            background: #f8fafc;
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .date-text {
            font-size: 12px;
            color: #64748b;
        }

        .name-text {
            font-weight: 600;
            color: #0f172a;
            font-size: 15px;
        }

        .amount-text {
            font-weight: 700;
            color: #ef4444;
            font-size: 16px;
        }

        .narration-text {
            color: #475569;
            font-size: 14px;
        }

        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .icon-btn {
            background: #f1f5f9;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: 0.2s;
        }

        .edit-btn:hover {
            background: #fef08a;
            color: #ca8a04;
        }

        .delete-btn:hover {
            background: #bbf7d0;
            color: #16a34a;
        }

        .empty-msg {
            padding: 30px;
            color: #94a3b8;
            text-align: center;
            font-style: italic;
        }

        /* PRINT SETTINGS */
        @media print {
            body {
                background: white;
                padding: 0;
            }

            .container {
                box-shadow: none;
                max-width: 100%;
                padding: 0;
            }

            .header-actions,
            .form-card,
            .actions,
            .action-header {
                display: none !important;
            }

            .table-grid {
                grid-template-columns: 100px 2fr 1.5fr 3fr;
            }
        }

        /* =========================================
   📱 MOBILE RESPONSIVE DESIGN (Media Queries)
   ========================================= */
        @media (max-width: 768px) {

            /* Header Area Layout */
            .header-section {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .header-actions {
                width: 100%;
                display: flex;
                gap: 10px;
            }

            .header-actions button {
                margin-left: 0;
                flex: 1;
                /* Dono buttons barabar jagah lenge */
                padding: 12px;
            }

            .main-header-amount {
                display: block;
                /* Amount ko nayi line par dikhane ke liye */
                margin-left: 0;
                margin-top: 5px;
            }

            /* Form Inputs ko ek ke niche ek karna */
            .grid-input {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .btn-add {
                margin-top: 8px;
                height: 50px;
            }

            /* -------------------------------------
       Table ko 'Card' style me badalna
       ------------------------------------- */
            .table-header {
                display: none;
                /* Mobile par upar wali heading hide kar denge */
            }

            .list-container {
                border: none;
                background: transparent;
            }

            .table-grid.list-item {
                display: flex;
                flex-direction: column;
                position: relative;
                background: #fff;
                border: 1px solid #e2e8f0;
                border-radius: 10px;
                padding: 15px;
                margin-bottom: 15px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.04);
                gap: 6px;
            }

            /* Card ke andar text ki setting */
            .date-text {
                font-size: 12px;
                margin-bottom: 2px;
            }

            .name-text {
                font-size: 18px;
                padding-right: 80px;
                /* Action buttons ke liye jagah chhodna */
            }

            .amount-text {
                font-size: 20px;
                color: #ef4444;
            }

            .narration-text {
                font-size: 14px;
                color: #64748b;
                margin-top: 4px;
                border-top: 1px dashed #e2e8f0;
                padding-top: 8px;
            }

            /* Edit/Delete buttons ko card ke top-right me set karna */
            .actions {
                position: absolute;
                top: 15px;
                right: 15px;
                gap: 8px;
            }

            .icon-btn {
                width: 36px;
                height: 36px;
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header-section">
            <h2>
                📊 Financial Ledger
                <span class="main-header-amount" id="mainHeaderAmount">(₹0)</span>
                <span class="main-header-entries" id="mainHeaderEntries">(0)</span>
            </h2>
            <div class="header-actions">
                <button class="btn-clear" onclick="clearAllData()">🗑️ Clear All</button>
                <button class="btn-print" onclick="window.print()">🖨️ Print / PDF</button>
            </div>
        </div>

        <div class="form-card">
            <div class="grid-input">
                <div class="input-group">
                    <label>1. PAYEE NAME</label>
                    <input type="text" id="name" placeholder="Name of person/supplier">
                </div>
                <div class="input-group">
                    <label>2. AMOUNT (₹)</label>
                    <input type="number" id="amt" placeholder="0.00">
                </div>
                <div class="input-group">
                    <label>3. NARRATION / DETAILS</label>
                    <input type="text" id="narration" placeholder="Almonds vendor, Packaging bill, etc...">
                </div>
                <button class="btn-add" id="mainBtn" onclick="addOrUpdatePayment()">+ ADD ENTRY</button>
            </div>
        </div>

        <div class="table-grid table-header">
            <div>DATE</div>
            <div>NAME</div>
            <div>AMOUNT</div>
            <div>NARRATION</div>
            <div class="action-header" style="text-align: center;">ACTION</div>
        </div>

        <div class="list-container" id="paymentList"></div>
    </div>

    <script type="module">
        import { db, collection, addDoc, onSnapshot, doc, deleteDoc, updateDoc } from './firebase-config.js';

        let payments = [];
        let editingId = null;

        const formatMoney = (num) => {
            return Number(num).toLocaleString('en-IN');
        };

        const paymentsCol = collection(db, "payments");

        onSnapshot(paymentsCol, (snapshot) => {
            payments = [];
            snapshot.forEach((doc) => {
                payments.push({ id: doc.id, ...doc.data() });
            });
            showPayments();
        });

        window.addOrUpdatePayment = async function () {
            let nameInput = document.getElementById('name').value;
            let amtInput = document.getElementById('amt').value;
            let narrInput = document.getElementById('narration').value;
            let today = new Date().toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });

            if (nameInput !== '' && Number(amtInput) > 0) {
                if (!editingId) {
                    await addDoc(paymentsCol, {
                        date: today,
                        name: nameInput,
                        amount: Number(amtInput),
                        narration: narrInput,
                        timestamp: Date.now()
                    });
                } else {
                    const paymentRef = doc(db, "payments", editingId);
                    await updateDoc(paymentRef, {
                        name: nameInput,
                        amount: Number(amtInput),
                        narration: narrInput,
                        timestamp: Date.now()
                    });
                    editingId = null;
                    let btn = document.getElementById('mainBtn');
                    btn.innerText = "+ ADD ENTRY";
                    btn.style.backgroundColor = "#3b82f6";
                }

                document.getElementById('name').value = '';
                document.getElementById('amt').value = '';
                document.getElementById('narration').value = '';
            } else {
                alert("Please enter a valid Name and an Amount greater than 0!");
            }
        };

        window.editPayment = function (id) {
            let p = payments.find(pay => pay.id === id);
            if (p) {
                document.getElementById('name').value = p.name;
                document.getElementById('amt').value = p.amount;
                document.getElementById('narration').value = p.narration || "";

                editingId = id;
                let btn = document.getElementById('mainBtn');
                btn.innerText = "✓ UPDATE ENTRY";
                btn.style.backgroundColor = "#eab308";
            }
        };

        window.deletePayment = async function (id) {
            if (confirm("Mark this as PAID? It will be removed from the list. ✅")) {
                if (editingId === id) {
                    editingId = null;
                    document.getElementById('mainBtn').innerText = "+ ADD ENTRY";
                    document.getElementById('mainBtn').style.backgroundColor = "#3b82f6";
                    document.getElementById('name').value = '';
                    document.getElementById('amt').value = '';
                    document.getElementById('narration').value = '';
                }
                await deleteDoc(doc(db, "payments", id));
            }
        };

        // SECURE & OBFUSCATED CLEAR ALL FUNCTION
        window.clearAllData = async function () {
            // No hint in the prompt anymore
            let authKey = prompt("⚠️ SYSTEM WARNING: Action restricted.\n\nEnter Admin Authorization Key:");

            if (authKey === null) return; // if user clicks cancel

            // Obfuscated logic: Generates 'DDMMYYYYEDIT' without writing 'EDIT' or 'Date' explicitly
            let d = new Date();
            let req = [
                String(d.getDate()).padStart(2, '0'),
                String(d.getMonth() + 1).padStart(2, '0'),
                d.getFullYear(),
                String.fromCharCode(69, 68, 73, 84) // This generates 'EDIT'
            ].join('');

            // Using btoa (Base64 encoding) to compare, so it's not a direct string match
            if (btoa(authKey) === btoa(req)) {
                const deletePromises = payments.map(p => deleteDoc(doc(db, "payments", p.id)));
                await Promise.all(deletePromises);
                alert("✅ System data cleared successfully.");
            } else {
                alert("❌ Access Denied. Incorrect Key.");
            }
        };

        function showPayments() {
            let listElement = document.getElementById('paymentList');
            let totalPayable = 0;
            listElement.innerHTML = '';

            payments.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));

            if (payments.length === 0) {
                listElement.innerHTML = '<div class="empty-msg">No pending payments. You are all clear! 🎉</div>';
            } else {
                payments.forEach((payment) => {
                    totalPayable += Number(payment.amount);

                    let row = document.createElement('div');
                    row.className = 'table-grid list-item';
                    row.innerHTML = `
                    <div class="date-text">${payment.date}</div>
                    <div class="name-text">${payment.name}</div>
                    <div class="amount-text">₹${formatMoney(payment.amount)}</div>
                    <div class="narration-text">${payment.narration ? payment.narration : '-'}</div>
                    <div class="actions">
                        <button class="icon-btn edit-btn" onclick="editPayment('${payment.id}')" title="Edit">✏️</button>
                        <button class="icon-btn delete-btn" onclick="deletePayment('${payment.id}')" title="Mark as Paid">✅</button>
                    </div>
                `;
                    listElement.appendChild(row);
                });
            }

            document.getElementById('mainHeaderAmount').innerText = `(₹${formatMoney(totalPayable)})`;
            document.getElementById('mainHeaderEntries').innerText = `(${payments.length})`;
        }
    </script>
</body>

</html>
